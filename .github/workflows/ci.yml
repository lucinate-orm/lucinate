name: CI

# main: source only (build/ gitignored). On push to main, job `release` resets branch `release`
# to match main, compiles, commits build/, and pushes — consumers can target `release` for a ready build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:run

  release:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Sync release branch with main and publish build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B release origin/main
          npm ci
          npm run build
          npm run test:run
          git add -f build
          if git diff --staged --quiet; then
            echo "No changes under build/"
          else
            git commit -m "chore: sync build output"
          fi
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git push origin release --force-with-lease
          else
            git push -u origin release
          fi
